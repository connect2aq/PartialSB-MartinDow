<template>
    <lightning-modal-header label="Field Service Report Viewer"></lightning-modal-header>
    <lightning-modal-body>
        <div style="width:100%; height:650px;">
            <iframe src={pdfUrl} width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </lightning-modal-body>
    <lightning-modal-footer>
        <lightning-button label="Attach to Files"
                          variant="brand"
                          onclick={attachPdf}>
        </lightning-button>
        <lightning-button label="Close"
                          variant="neutral"
                          onclick={closeModal}>
        </lightning-button>
    </lightning-modal-footer>
</template>
