<div class="slds-text-body_regular">                                  {customer.businessCaseStatus}                                </div>
</div>
<div                                class="slds-col slds-size_1-of-2 slds-m-bottom_x-small"                              >
<div                                  class="slds-text-body_small slds-text-color_weak"                                >                                  Machine Status                                </div>
<div class="slds-text-body_regular">                                  {customer.machineStatus}                                </div>
</div>
</div>
<!-- Addresses Section -->
<div                              class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_medium"                            >
<!-- Bill To Address -->
<div class="slds-col slds-size_1-of-2">
<div                                  class="slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small"                                >
<lightning-icon                                    icon-name="utility:location"                                    size="xx-small"                                  >
</lightning-icon>                                  &nbsp;Bill To Address                                </div>
<div class="slds-text-body_small">
<div>{customer.city}</div>
<template if:true={customer.addressLine1}>
<div>{customer.addressLine1}</div>
</template>
<template if:true={customer.addressLine2}>
<div>{customer.addressLine2}</div>
</template>
</div>
</div>
<!-- Ship To Address -->
<div class="slds-col slds-size_1-of-2">
<div                                  class="slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small"                                >
<lightning-icon                                    icon-name="utility:send"                                    size="xx-small"                                  >
</lightning-icon>                                  &nbsp;Ship To Address                                </div>
<div class="slds-text-body_small">
<template                                    if:true={customer.shipToCustomerName}                                  >
<div class="slds-text-body_regular">                                      {customer.shipToCustomerName}                                    </div>
</template>
<div>{customer.shipToCity}</div>
<template                                    if:true={customer.shipToAddressLine1}                                  >
<div>{customer.shipToAddressLine1}</div>
</template>
<template                                    if:true={customer.shipToAddressLine2}                                  >
<div>{customer.shipToAddressLine2}</div>
</template>
</div>
</div>
</div>
<!-- Performance Metrics -->
<div class="slds-grid slds-wrap slds-gutters_small">
<div                                class="slds-col slds-size_1-of-2 slds-m-bottom_x-small"                              >
<div                                  class="slds-text-body_small slds-text-color_weak"                                >                                  Investment                                </div>
<div class="slds-text-heading_small">                                  {customer.formattedInvestment}                                </div>
</div>
<div                                class="slds-col slds-size_1-of-2 slds-m-bottom_x-small"                              >
<div                                  class="slds-text-body_small slds-text-color_weak"                                >                                  Total Sales                                </div>
<div class="slds-text-heading_small">                                  {customer.formattedTotalSales}                                </div>
</div>
<!-- <div                                class="slds-col slds-size_1-of-2 slds-m-bottom_x-small"                              >
<div                                  class="slds-text-body_small slds-text-color_weak"                                >                                  Cost Recovery                                </div>
<div class="slds-text-heading_small">                                  {customer.costRecoveryPercent}                                </div>
</div> -->
<div                                class="slds-col slds-size_1-of-2 slds-m-bottom_x-small"                              >
<div                                  class="slds-text-body_small slds-text-color_weak"                                >                                  Margin                                </div>
<div class="slds-text-heading_small">                                  {customer.formattedMargin}                                </div>
</div>
</div>
</div>
</div>
</div>
</template>
</div>
</template>
<!-- Pagination for Cards/Table -->
<div class="slds-card__footer">
<div                    class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center"                  >
<div class="slds-col">
<span class="slds-text-body_small slds-text-color_weak">                        Showing {startRecord} to {endRecord} of {totalRecords}                        customers                      </span>
</div>
<div class="slds-col slds-no-flex">
<lightning-button-group>
<lightning-button                          label="Previous"                          icon-name="utility:chevronleft"                          onclick={handlePreviousPage}                          disabled={isFirstPage}                        >
</lightning-button>
<lightning-button                          label="Next"                          icon-name="utility:chevronright"                          icon-position="right"                          onclick={handleNextPage}                          disabled={isLastPage}                        >
</lightning-button>
</lightning-button-group>
</div>
</div>
</div>
</lightning-card>
</div>
</div>
</lightning-tab>
<!-- Detailed View Tab -->
<lightning-tab label="Detailed View" value="detailed">
<div class="slds-p-around_medium">
<lightning-card              title="Business Case Snapshots"              icon-name="standard:calibration"            >
<div slot="actions">
<lightning-button                  variant="brand-outline"                  label="Export to Excel"                  icon-name="utility:download"                  onclick={exportSnapshotsToExcel}>
</lightning-button>
</div>
<!-- Pagination Info -->
<div                class="slds-text-body_small slds-text-color_weak slds-m-bottom_small"              >
<span                  >Showing {startRecord} to {endRecord} of {totalRecords}                  records</span                >
</div>
<lightning-datatable                key-field="id"                data={detailedPaginatedData}                columns={detailedSnapshotColumns}                hide-checkbox-column="true"                show-row-number-column="false"                onrowaction={handleRowAction}              >
</lightning-datatable>
<!-- Pagination Controls -->
<div                class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-top_small"              >
<lightning-button-group>
<lightning-button                    label="Previous"                    icon-name="utility:chevronleft"                    disabled={isDetailedFirstPage}                    onclick={handleDetailedPreviousPage}                  >
</lightning-button>
<lightning-button                    label="Next"                    icon-name="utility:chevronright"                    icon-position="right"                    disabled={isDetailedLastPage}                    onclick={handleDetailedNextPage}                  >
</lightning-button>
</lightning-button-group>
<span class="slds-text-body_small slds-text-color_weak"                  >Page {detailedCurrentPage} of {totalDetailPages}</span                >
</div>
</lightning-card>
</div>
</lightning-tab>
</lightning-tabset>
<!-- Loading Spinner -->
<template if:true={isLoading}>
<lightning-spinner          alternative-text="Loading dashboard data..."          size="large"        >
</lightning-spinner>
</template>
</div>
<!-- Customer Detail Modal -->
<template if:true={showCustomerModal}>
<section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
<div class="slds-modal__container">
<header class="slds-modal__header">
<button              class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"              onclick={closeCustomerModal}            >
<lightning-icon                icon-name="utility:close"                size="small"              >
</lightning-icon>
<span class="slds-assistive-text">Close</span>
</button>
<h2 class="slds-modal__title slds-hyphenate">Customer Details</h2>
</header>
<div class="slds-modal__content slds-p-around_medium">
<template if:true={selectedCustomerData}>
<div class="customer-detail-grid">
<div class="detail-section">
<h3 class="section-title">
<lightning-icon                      icon-name="standard:account"                      size="small"                    >
</lightning-icon>                    Customer Information                  </h3>
<div class="detail-row">
<span class="detail-label">Customer Code:</span>
<span class="detail-value"                      >{selectedCustomerData.customerCode}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Customer Name:</span>
<span class="detail-value"                      >{selectedCustomerData.customerName}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Region:</span>
<span class="detail-value"                      >{selectedCustomerData.region}</span                    >
</div>
</div>
<div class="detail-section">
<h3 class="section-title">
<lightning-icon                      icon-name="standard:address"                      size="small"                    >
</lightning-icon>                    Bill To Address Information                  </h3>
<div class="detail-row">
<span class="detail-label">City:</span>
<span class="detail-value"                      >{selectedCustomerData.city}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Address Line 1:</span>
<span class="detail-value"                      >{selectedCustomerData.addressLine1}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Address Line 2:</span>
<span class="detail-value"                      >{selectedCustomerData.addressLine2}</span                    >
</div>
</div>
<div class="detail-section">
<h3 class="section-title">
<lightning-icon                      icon-name="standard:location"                      size="small"                    >
</lightning-icon>                    Ship To Account Information                  </h3>
<div class="detail-row">
<span class="detail-label">Ship To Customer Number:</span>
<span class="detail-value"                      >{selectedCustomerData.shipToCustomerNumber}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Ship To Customer Name:</span>
<span class="detail-value"                      >{selectedCustomerData.shipToCustomerName}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Ship To City:</span>
<span class="detail-value"                      >{selectedCustomerData.shipToCity}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Ship To Address Line 1:</span>
<span class="detail-value"                      >{selectedCustomerData.shipToAddressLine1}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Ship To Address Line 2:</span>
<span class="detail-value"                      >{selectedCustomerData.shipToAddressLine2}</span                    >
</div>
</div>
<div class="detail-section">
<h3 class="section-title">
<lightning-icon                      icon-name="standard:sales_path"                      size="small"                    >
</lightning-icon>                    Performance Metrics                  </h3>
<div class="detail-row">
<span class="detail-label">Total Investment:</span>
<span class="detail-value"                      >{selectedCustomerData.formattedInvestment}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Total Sales:</span>
<span class="detail-value"                      >{selectedCustomerData.formattedSales}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Cost Recovery:</span>
<span class="detail-value"                      >{selectedCustomerData.formattedCostRecovery}</span                    >
</div>
<div class="detail-row">
<span class="detail-label">Machine Count:</span>
<span class="detail-value"                      >{selectedCustomerData.machines}</span                    >
</div>
</div>
<!-- Risk Management Section -->
<div class="detail-section">
<h3 class="section-title">
<lightning-icon                      icon-name="utility:shield"                      size="small"                    >
</lightning-icon>                    Risk Management Assessment                  </h3>
<div class="detail-row">
<span class="detail-label">Risk Level:</span>
<span class="detail-value">
<span class={selectedCustomerData.riskBadgeClass}>
<lightning-icon                          icon-name={selectedCustomerData.riskIcon}                          size="xx-small"                          class="slds-m-right_xx-small"                        >
</lightning-icon>                        {selectedCustomerData.riskLevel}                      </span>
</span>
</div>
<div class="detail-row">
<span class="detail-label">Risk Status:</span>
<span class={selectedCustomerData.riskStatusTextClass}                      >{selectedCustomerData.riskStatusText}</span                    >
</div>
<template if:true={selectedCustomerData.showActionRequired}>
<div class="detail-row">
<span class="detail-label">Required Action:</span>
<span class="detail-value"                        >{selectedCustomerData.riskActionLabel}</span                      >
</div>
</template>
</div>
</div>
</template>
</div>
<footer class="slds-modal__footer">
<lightning-button              variant="neutral"              label="Close"              onclick={closeCustomerModal}            >
</lightning-button>
</footer>
</div>
</section>
<div class="slds-backdrop slds-backdrop_open">
</div>
</template>
</div>
</template>
