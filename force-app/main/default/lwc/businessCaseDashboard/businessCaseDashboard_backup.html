<template>
  <!-- Main Container with SLDS Styling -->
  <div class="slds-p-around_medium">
    <!-- Page Header -->
    <div class="slds-page-header slds-m-bottom_large">
      <div class="slds-page-header__row">
        <div class="slds-page-header__col-title">
          <div class="slds-media">
            <div class="slds-media__figure">
              <lightning-icon
                icon-name="standard:account"
                size="medium"
              ></lightning-icon>
            </div>
            <div class="slds-media__body">
              <div class="slds-page-header__name">
                <div class="slds-page-header__name-title">
                  <h1>
                    <span class="slds-page-header__title slds-truncate"
                      >Reagent Sales Dashboard</span
                    >
                  </h1>
                </div>
              </div>
              <p class="slds-page-header__name-meta">
                Investment performance and commitment tracking across regions,
                suppliers and customers
              </p>
            </div>
          </div>
        </div>
        <div class="slds-page-header__col-actions">
          <div class="slds-page-header__controls">
            <lightning-button-group>
              <lightning-button
                label="Refresh Data"
                icon-name="utility:refresh"
                onclick={handleRefresh}
                variant="brand"
              >
              </lightning-button>
              <lightning-button
                label="Export Data"
                icon-name="utility:download"
                onclick={handleExport}
                variant="neutral"
              >
              </lightning-button>
            </lightning-button-group>
          </div>
        </div>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="slds-m-bottom_large">
      <!-- Financial Overview Section -->
      <div class="slds-m-bottom_small">
        <h3 class="slds-text-heading_medium slds-m-bottom_small">
          <lightning-icon
            icon-name="standard:opportunity"
            size="small"
            class="slds-m-right_x-small"
          ></lightning-icon>
          Financial Performance Overview
        </h3>
      </div>

      <!-- Financial Metrics Row -->
      <div class="slds-grid slds-gutters slds-wrap slds-m-bottom_medium">
        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4"
        >
          <div class="slds-box slds-theme_default slds-text-align_center">
            <div class="slds-media slds-media_center slds-m-bottom_small">
              <div class="slds-media__figure">
                <lightning-icon
                  icon-name="standard:opportunity"
                  size="small"
                ></lightning-icon>
              </div>
              <div class="slds-media__body">
                <span class="slds-text-heading_small">Total Investment</span>
              </div>
            </div>
            <div class="slds-text-heading_large slds-text-color_success">
              {formattedTotalInvestment}
            </div>
          </div>
        </div>

        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4"
        >
          <div class="slds-box slds-theme_default slds-text-align_center">
            <div class="slds-media slds-media_center slds-m-bottom_small">
              <div class="slds-media__figure">
                <lightning-icon
                  icon-name="standard:sales_path"
                  size="small"
                ></lightning-icon>
              </div>
              <div class="slds-media__body">
                <span class="slds-text-heading_small">Total Sales</span>
              </div>
            </div>
            <div class="slds-text-heading_large slds-text-color_success">
              {formattedTotalSales}
            </div>
          </div>
        </div>

        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4"
        >
          <div class="slds-box slds-theme_default slds-text-align_center">
            <div class="slds-media slds-media_center slds-m-bottom_small">
              <div class="slds-media__figure">
                <lightning-icon
                  icon-name="standard:calibration"
                  size="small"
                ></lightning-icon>
              </div>
              <div class="slds-media__body">
                <span class="slds-text-heading_small">Cost Recovery</span>
              </div>
            </div>
            <div class="slds-text-heading_large slds-text-color_success">
              {formattedCostRecovery}
            </div>
          </div>
        </div>

        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4"
        >
          <div class="slds-box slds-theme_default slds-text-align_center">
            <div class="slds-media slds-media_center slds-m-bottom_small">
              <div class="slds-media__figure">
                <lightning-icon
                  icon-name="standard:goals"
                  size="small"
                ></lightning-icon>
              </div>
              <div class="slds-media__body">
                <span class="slds-text-heading_small">Achievement</span>
              </div>
            </div>
            <div class="slds-text-heading_large slds-text-color_success">
              {formattedCommitmentAchievement}
            </div>
          </div>
        </div>
      </div>

      <!-- Machine Status Section -->
      <div class="slds-m-bottom_small">
        <h3 class="slds-text-heading_medium slds-m-bottom_small">
          <lightning-icon
            icon-name="standard:asset_object"
            size="small"
            class="slds-m-right_x-small"
          ></lightning-icon>
          Diagnostic Machine Status Overview
        </h3>
      </div>

      <!-- Machine Status Tiles Row -->
      <div class="slds-grid slds-gutters slds-wrap">
        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5"
        >
          <div class="slds-box slds-theme_default slds-text-align_center">
            <div class="slds-media slds-media_center slds-m-bottom_small">
              <div class="slds-media__figure">
                <lightning-icon
                  icon-name="standard:work_order"
                  size="small"
                  class="slds-icon-text-warning"
                ></lightning-icon>
              </div>
              <div class="slds-media__body">
                <span class="slds-text-heading_small">Ordered</span>
              </div>
            </div>
            <div class="slds-text-heading_large">{orderedMachines}</div>
          </div>
        </div>

        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5"
        >
          <div class="slds-box slds-theme_default slds-text-align_center">
            <div class="slds-media slds-media_center slds-m-bottom_small">
              <div class="slds-media__figure">
                <lightning-icon
                  icon-name="standard:asset_object"
                  size="small"
                  class="slds-icon-text-success"
                ></lightning-icon>
              </div>
              <div class="slds-media__body">
                <span class="slds-text-heading_small">Installed</span>
              </div>
            </div>
            <div class="slds-text-heading_large">{installedMachines}</div>
          </div>
        </div>

        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5"
        >
          <div class="slds-box slds-theme_default slds-text-align_center">
            <div class="slds-media slds-media_center slds-m-bottom_small">
              <div class="slds-media__figure">
                <lightning-icon
                  icon-name="utility:success"
                  size="small"
                  class="slds-icon-text-success"
                ></lightning-icon>
              </div>
              <div class="slds-media__body">
                <span class="slds-text-heading_small">Active</span>
              </div>
            </div>
            <div class="slds-text-heading_large">{activeMachines}</div>
          </div>
        </div>

        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5"
        >
          <div class="slds-box slds-theme_default slds-text-align_center">
            <div class="slds-media slds-media_center slds-m-bottom_small">
              <div class="slds-media__figure">
                <lightning-icon
                  icon-name="utility:error"
                  size="small"
                  class="slds-icon-text-error"
                ></lightning-icon>
              </div>
              <div class="slds-media__body">
                <span class="slds-text-heading_small">Rejected</span>
              </div>
            </div>
            <div class="slds-text-heading_large">{rejectedMachines}</div>
          </div>
        </div>

        <div
          class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-5"
        >
          <div class="slds-box slds-theme_default slds-text-align_center">
            <div class="slds-media slds-media_center slds-m-bottom_small">
              <div class="slds-media__figure">
                <lightning-icon
                  icon-name="standard:maintenance_asset"
                  size="small"
                  class="slds-icon-text-default"
                ></lightning-icon>
              </div>
              <div class="slds-media__body">
                <span class="slds-text-heading_small">Inactive</span>
              </div>
            </div>
            <div class="slds-text-heading_large">{inactiveMachines}</div>
          </div>
        </div>
      </div>

      <!-- Customer Commitment Status Section -->
      <div class="slds-m-bottom_small slds-m-top_large">
        <h3 class="slds-text-heading_medium slds-m-bottom_small">
          <lightning-icon
            icon-name="standard:goals"
            size="small"
            class="slds-m-right_x-small"
          ></lightning-icon>
          Customer Commitment & Risk Assessment Overview
        </h3>
        <div
          class="slds-text-body_small slds-text-color_weak slds-m-bottom_medium"
        >
          Comprehensive view of customer performance including current month
          status and consecutive failure risk analysis.
        </div>
      </div>

      <!-- Section 1: Current Month Performance Status -->
      <div class="slds-m-bottom_medium">
        <h4 class="slds-text-heading_small slds-m-bottom_small">
          📊 Current Month Performance Status
        </h4>
        <div
          class="slds-text-body_small slds-text-color_weak slds-m-bottom_small"
        >
          Based on average monthly sales vs. monthly commitment (current month
          snapshot)
        </div>
        <div class="slds-grid slds-gutters slds-wrap">
          <div
            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3"
          >
            <div class="slds-box slds-theme_default slds-text-align_center">
              <div class="slds-media slds-media_center slds-m-bottom_small">
                <div class="slds-media__figure">
                  <lightning-icon
                    icon-name="utility:error"
                    size="small"
                    class="slds-icon-text-error"
                  ></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <span class="slds-text-heading_small">Behind Target</span>
                </div>
              </div>
              <div class="slds-text-heading_large">{behindTargetCustomers}</div>
            </div>
          </div>

          <div
            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3"
          >
            <div class="slds-box slds-theme_default slds-text-align_center">
              <div class="slds-media slds-media_center slds-m-bottom_small">
                <div class="slds-media__figure">
                  <lightning-icon
                    icon-name="utility:success"
                    size="small"
                    class="slds-icon-text-success"
                  ></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <span class="slds-text-heading_small">On Track</span>
                </div>
              </div>
              <div class="slds-text-heading_large">{onTrackCustomers}</div>
            </div>
          </div>

          <div
            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3"
          >
            <div class="slds-box slds-theme_default slds-text-align_center">
              <div class="slds-media slds-media_center slds-m-bottom_small">
                <div class="slds-media__figure">
                  <lightning-icon
                    icon-name="utility:target"
                    size="small"
                    class="slds-icon-text-default"
                  ></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <span class="slds-text-heading_small">No Target Set</span>
                </div>
              </div>
              <div class="slds-text-heading_large">{noTargetCustomers}</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Section 2: Asset Protection Risk Analysis -->
      <div class="slds-m-bottom_large">
        <h4 class="slds-text-heading_small slds-m-bottom_small">
          ⚠️ Asset Protection Risk Analysis
        </h4>
        <div
          class="slds-text-body_small slds-text-color_weak slds-m-bottom_small"
        >
          Based on consecutive months of target failures (trend analysis for
          asset recovery decisions)
        </div>
        <div class="slds-grid slds-gutters slds-wrap">
          <div
            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4"
          >
            <div class="slds-box slds-theme_default slds-text-align_center">
              <div class="slds-media slds-media_center slds-m-bottom_small">
                <div class="slds-media__figure">
                  <lightning-icon
                    icon-name="utility:success"
                    size="small"
                    class="slds-icon-text-success"
                  ></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <span class="slds-text-heading_small">HEALTHY</span>
                </div>
              </div>
              <div class="slds-text-heading_large">
                {formattedRiskSummary.healthyCount}
              </div>
              <div class="slds-text-body_small slds-text-color_weak">
                0 Failed Months
              </div>
            </div>
          </div>

          <div
            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4"
          >
            <div class="slds-box slds-theme_default slds-text-align_center">
              <div class="slds-media slds-media_center slds-m-bottom_small">
                <div class="slds-media__figure">
                  <lightning-icon
                    icon-name="utility:info"
                    size="small"
                    class="slds-icon-text-default"
                  ></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <span class="slds-text-heading_small">WARNING</span>
                </div>
              </div>
              <div class="slds-text-heading_large">
                {formattedRiskSummary.warningCount}
              </div>
              <div class="slds-text-body_small slds-text-color_weak">
                1 Failed Month
              </div>
            </div>
          </div>

          <div
            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4"
          >
            <div class="slds-box slds-theme_default slds-text-align_center">
              <div class="slds-media slds-media_center slds-m-bottom_small">
                <div class="slds-media__figure">
                  <lightning-icon
                    icon-name="utility:warning"
                    size="small"
                    class="slds-icon-text-warning"
                  ></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <span class="slds-text-heading_small">HIGH RISK</span>
                </div>
              </div>
              <div class="slds-text-heading_large">
                {formattedRiskSummary.highCount}
              </div>
              <div class="slds-text-body_small slds-text-color_weak">
                2-3 Failed Months
              </div>
            </div>
          </div>

          <div
            class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4"
          >
            <div class="slds-box slds-theme_default slds-text-align_center">
              <div class="slds-media slds-media_center slds-m-bottom_small">
                <div class="slds-media__figure">
                  <lightning-icon
                    icon-name="utility:error"
                    size="small"
                    class="slds-icon-text-error"
                  ></lightning-icon>
                </div>
                <div class="slds-media__body">
                  <span class="slds-text-heading_small">CRITICAL</span>
                </div>
              </div>
              <div class="slds-text-heading_large">
                {formattedRiskSummary.criticalCount}
              </div>
              <div class="slds-text-body_small slds-text-color_weak">
                4+ Failed Months
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Filter Section -->
      <div class="slds-m-bottom_large">
        <lightning-card title="Filters">
          <div class="slds-grid slds-gutters slds-wrap">
            <div
              class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-8"
            >
              <lightning-combobox
                name="monthFilter"
                label="Month"
                value={selectedMonth}
                placeholder="All Months"
                options={monthOptions}
                onchange={handleMonthChange}
              >
              </lightning-combobox>
            </div>
            <div
              class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-8"
            >
              <lightning-combobox
                name="customerFilter"
                label="Customer"
                value={selectedCustomer}
                placeholder="All Customers"
                options={customerOptions}
                onchange={handleCustomerChange}
              >
              </lightning-combobox>
            </div>
            <div
              class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-8"
            >
              <lightning-combobox
                name="regionFilter"
                label="Region"
                value={selectedRegion}
                placeholder="All Regions"
                options={regionOptions}
                onchange={handleRegionChange}
              >
              </lightning-combobox>
            </div>
            <div
              class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-8"
            >
              <lightning-combobox
                name="supplierFilter"
                label="Supplier"
                value={selectedSupplier}
                placeholder="All Suppliers"
                options={supplierOptions}
                onchange={handleSupplierChange}
              >
              </lightning-combobox>
            </div>
            <div
              class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-8"
            >
              <lightning-combobox
                name="businessCaseStatusFilter"
                label="Business Case Status"
                value={selectedBusinessCaseStatus}
                placeholder="All Business Case Statuses"
                options={businessCaseStatusOptions}
                onchange={handleBusinessCaseStatusChange}
              >
              </lightning-combobox>
            </div>
            <div
              class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-8"
            >
              <lightning-combobox
                name="machineStatusFilter"
                label="Machine Status"
                value={selectedMachineStatus}
                placeholder="All Machine Statuses"
                options={machineStatusOptions}
                onchange={handleMachineStatusChange}
              >
              </lightning-combobox>
            </div>
            <div
              class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-8"
            >
              <lightning-combobox
                name="commitmentStatusFilter"
                label="Commitment Status"
                value={selectedCommitmentStatus}
                placeholder="All Commitment Statuses"
                options={commitmentStatusOptions}
                onchange={handleCommitmentStatusChange}
              >
              </lightning-combobox>
            </div>
            <div
              class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-8"
            >
              <lightning-combobox
                name="riskStatusFilter"
                label="Risk Status"
                value={selectedRiskStatus}
                placeholder="All Risk Levels"
                options={riskStatusOptions}
                onchange={handleRiskStatusChange}
              >
              </lightning-combobox>
            </div>
            <div
              class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-8"
            >
              <lightning-input
                type="search"
                name="searchInput"
                label="Search"
                value={searchTerm}
                placeholder="Search customers, regions..."
                onchange={handleSearchChange}
              >
              </lightning-input>
            </div>
          </div>
        </lightning-card>
      </div>

      <!-- Tab Navigation -->
      <lightning-tabset active-tab-value={activeTab} onactive={handleTabChange}>
        <!-- Commitment Performance Tab -->
        <lightning-tab label="Commitment Performance" value="commitment">
          <div class="slds-p-around_medium slds-grid slds-wrap slds-gutters">
            <!-- Regional Commitment Report -->
            <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
              <lightning-card
                title="Regional Commitment Performance"
                icon-name="standard:location"
              >
                <lightning-datatable
                  key-field="region"
                  data={regionalCommitmentData}
                  columns={regionalCommitmentColumns}
                  hide-checkbox-column="true"
                  show-row-number-column="true"
                >
                </lightning-datatable>
              </lightning-card>
            </div>

            <!-- Supplier Commitment Report -->
            <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
              <lightning-card
                title="Supplier Commitment Performance"
                icon-name="standard:partners"
              >
                <lightning-datatable
                  key-field="supplier"
                  data={supplierCommitmentData}
                  columns={supplierCommitmentColumns}
                  hide-checkbox-column="true"
                  show-row-number-column="true"
                >
                </lightning-datatable>
              </lightning-card>
            </div>

            <!-- Customer Commitment Report -->
            <div class="slds-col slds-size_1-of-1">
              <lightning-card
                title="Customer Commitment Performance"
                icon-name="standard:account"
              >
                <!-- View Mode Toggle -->
                <div slot="actions">
                  <lightning-combobox
                    name="viewModeToggle"
                    label="View Mode"
                    value={customerViewMode}
                    placeholder="Select View Mode"
                    options={viewModeOptions}
                    onchange={handleViewModeToggle}
                    variant="label-hidden"
                  >
                  </lightning-combobox>
                </div>

                <!-- Table View -->
                <template if:true={isTableView}>
                  <lightning-datatable
                    key-field="customerCode"
                    data={paginatedCustomerCommitmentData}
                    columns={customerCommitmentColumns}
                    hide-checkbox-column="true"
                    show-row-number-column="true"
                    onrowaction={handleCustomerRowAction}
                  >
                  </lightning-datatable>
                </template>

                <!-- Card View -->
                <template if:true={isCardView}>
                  <div

              </lightning-card>
            </div>
          </div>
        </lightning-tab>

        <!-- Investment Trends Tab -->
        <lightning-tab label="Investment Trends" value="investment-trends">
          <div class="slds-p-around_medium">
            <!-- Trend View Controls -->
            <div class="slds-m-bottom_medium">
              <lightning-card title="Trend Analysis Controls">
                <div class="slds-grid slds-gutters slds-wrap">
                  <div
                    class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3"
                  >
                    <lightning-combobox
                      name="trendViewMode"
                      label="Analysis Level"
                      value={trendViewMode}
                      placeholder="Select Analysis Level"
                      options={trendViewOptions}
                      onchange={handleTrendViewChange}
                    >
                    </lightning-combobox>
                  </div>
                  <div
                    class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3"
                  >
                    <lightning-combobox
                      name="trendTimeRange"
                      label="Time Range"
                      value={selectedTimeRange}
                      placeholder="Select Time Range"
                      options={timeRangeOptions}
                      onchange={handleTimeRangeChange}
                    >
                    </lightning-combobox>
                  </div>
                  <div
                    class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3"
                  >
                    <lightning-combobox
                      name="trendSegment"
                      label="Segment By"
                      value={selectedTrendSegment}
                      placeholder="Select Segment"
                      options={trendSegmentOptions}
                      onchange={handleTrendSegmentChange}
                    >
                    </lightning-combobox>
                  </div>
                </div>
              </lightning-card>
            </div>

            <!-- Investment Trend Charts -->
            <div class="slds-grid slds-wrap slds-gutters">
              <!-- Investment vs Sales Timeline -->
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
                <lightning-card
                  title="Investment vs Sales Timeline"
                  icon-name="standard:opportunity"
                >
                  <div slot="actions">
                    <lightning-button-icon
                      icon-name="utility:download"
                      variant="border-filled"
                      alternative-text="Export Chart"
                      title="Export Chart"
                      onclick={handleExportInvestmentChart}
                    >
                    </lightning-button-icon>
                  </div>
                  <div class="chart-container">
                    <canvas
                      id="investmentVsSalesChart"
                      class="trend-chart"
                    ></canvas>
                  </div>
                </lightning-card>
              </div>

              <!-- Cost Recovery Progress -->
              <div
                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_large"
              >
                <lightning-card
                  title="Cost Recovery Progress"
                  icon-name="standard:calibration"
                >
                  <div class="chart-container">
                    <canvas id="costRecoveryChart" class="trend-chart"></canvas>
                  </div>
                </lightning-card>
              </div>

              <!-- ROI Efficiency Trends -->
              <div
                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_large"
              >
                <lightning-card
                  title="ROI Efficiency Over Time"
                  icon-name="standard:performance"
                >
                  <div class="chart-container">
                    <canvas
                      id="roiEfficiencyChart"
                      class="trend-chart"
                    ></canvas>
                  </div>
                </lightning-card>
              </div>

              <!-- Regional Investment Comparison -->
              <template if:true={showRegionalTrends}>
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
                  <lightning-card
                    title="Regional Investment Performance"
                    icon-name="standard:location"
                  >
                    <div class="chart-container">
                      <canvas
                        id="regionalInvestmentChart"
                        class="trend-chart"
                      ></canvas>
                    </div>
                  </lightning-card>
                </div>
              </template>

              <!-- Supplier Investment Comparison -->
              <template if:true={showSupplierTrends}>
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
                  <lightning-card
                    title="Supplier Investment Performance"
                    icon-name="standard:partners"
                  >
                    <div class="chart-container">
                      <canvas
                        id="supplierInvestmentChart"
                        class="trend-chart"
                      ></canvas>
                    </div>
                  </lightning-card>
                </div>
              </template>

              <!-- Top Customer Trends -->
              <template if:true={showCustomerTrends}>
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
                  <lightning-card
                    title="Top Customer Investment Trends"
                    icon-name="standard:account"
                  >
                    <div class="chart-container">
                      <canvas
                        id="customerInvestmentChart"
                        class="trend-chart"
                      ></canvas>
                    </div>
                  </lightning-card>
                </div>
              </template>
            </div>
          </div>
        </lightning-tab>

        <!-- Commitment Trends Tab -->
        <lightning-tab label="Commitment Trends" value="commitment-trends">
          <div class="slds-p-around_medium">
            <!-- Commitment Trend Charts -->
            <div class="slds-grid slds-wrap slds-gutters">
              <!-- Target vs Actual Achievement -->
              <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
                <lightning-card
                  title="Target vs Actual Achievement Timeline"
                  icon-name="standard:goals"
                >
                  <div slot="actions">
                    <lightning-button-icon
                      icon-name="utility:download"
                      variant="border-filled"
                      alternative-text="Export Chart"
                      title="Export Chart"
                      onclick={handleExportCommitmentChart}
                    >
                    </lightning-button-icon>
                  </div>
                  <div class="chart-container">
                    <canvas
                      id="targetVsActualChart"
                      class="trend-chart"
                    ></canvas>
                  </div>
                </lightning-card>
              </div>

              <!-- Performance Status Distribution -->
              <div
                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_large"
              >
                <lightning-card
                  title="Performance Status Over Time"
                  icon-name="standard:forecasts"
                >
                  <div class="chart-container">
                    <canvas
                      id="performanceStatusChart"
                      class="trend-chart"
                    ></canvas>
                  </div>
                </lightning-card>
              </div>

              <!-- Achievement Rate Trends -->
              <div
                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_large"
              >
                <lightning-card
                  title="Monthly Achievement Rate"
                  icon-name="standard:metrics"
                >
                  <div class="chart-container">
                    <canvas
                      id="achievementRateChart"
                      class="trend-chart"
                    ></canvas>
                  </div>
                </lightning-card>
              </div>

              <!-- Regional Commitment Comparison -->
              <template if:true={showRegionalCommitmentTrends}>
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
                  <lightning-card
                    title="Regional Commitment Performance"
                    icon-name="standard:location"
                  >
                    <div class="chart-container">
                      <canvas
                        id="regionalCommitmentChart"
                        class="trend-chart"
                      ></canvas>
                    </div>
                  </lightning-card>
                </div>
              </template>

              <!-- Supplier Commitment Comparison -->
              <template if:true={showSupplierCommitmentTrends}>
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
                  <lightning-card
                    title="Supplier Commitment Performance"
                    icon-name="standard:partners"
                  >
                    <div class="chart-container">
                      <canvas
                        id="supplierCommitmentChart"
                        class="trend-chart"
                      ></canvas>
                    </div>
                  </lightning-card>
                </div>
              </template>

              <!-- Customer Health Trends -->
              <template if:true={showCustomerHealthTrends}>
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_large">
                  <lightning-card
                    title="Customer Health Trends"
                    icon-name="standard:account"
                  >
                    <div class="chart-container">
                      <canvas
                        id="customerHealthChart"
                        class="trend-chart"
                      ></canvas>
                    </div>
                  </lightning-card>
                </div>
              </template>
            </div>
          </div>
        </lightning-tab>

        <!-- Detailed View Tab -->
        <lightning-tab label="Detailed View" value="detailed">
          <div class="slds-p-around_medium">
            <lightning-card
              title="Business Case Snapshots"
              icon-name="standard:calibration"
            >
              <!-- Pagination Info -->
              <div
                class="slds-text-body_small slds-text-color_weak slds-m-bottom_small"
              >
                <span
                  >Showing {startRecord} to {endRecord} of {totalRecords}
                  records</span
                >
              </div>

              <lightning-datatable
                key-field="id"
                data={paginatedData}
                columns={detailedColumns}
                hide-checkbox-column="true"
                show-row-number-column="false"
                onrowaction={handleRowAction}
              >
              </lightning-datatable>

              <!-- Pagination Controls -->
              <div
                class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-top_small"
              >
                <lightning-button-group>
                  <lightning-button
                    label="Previous"
                    icon-name="utility:chevronleft"
                    disabled={isFirstPage}
                    onclick={handlePreviousPage}
                  >
                  </lightning-button>
                  <lightning-button
                    label="Next"
                    icon-name="utility:chevronright"
                    icon-position="right"
                    disabled={isLastPage}
                    onclick={handleNextPage}
                  >
                  </lightning-button>
                </lightning-button-group>
                <span class="slds-text-body_small slds-text-color_weak"
                  >Page {currentPage} of {totalPages}</span
                >
              </div>
            </lightning-card>
          </div>
        </lightning-tab>
      </lightning-tabset>

      <!-- Loading Spinner -->
      <template if:true={isLoading}>
        <lightning-spinner
          alternative-text="Loading dashboard data..."
          size="large"
        ></lightning-spinner>
      </template>
    </div>

    <!-- Customer Detail Modal -->
    <template if:true={showCustomerModal}>
      <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
          <header class="slds-modal__header">
            <button
              class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
              onclick={closeCustomerModal}
            >
              <lightning-icon
                icon-name="utility:close"
                size="small"
              ></lightning-icon>
              <span class="slds-assistive-text">Close</span>
            </button>
            <h2 class="slds-modal__title slds-hyphenate">Customer Details</h2>
          </header>
          <div class="slds-modal__content slds-p-around_medium">
            <template if:true={selectedCustomerData}>
              <div class="customer-detail-grid">
                <div class="detail-section">
                  <h3 class="section-title">
                    <lightning-icon
                      icon-name="standard:account"
                      size="small"
                    ></lightning-icon>
                    Customer Information
                  </h3>
                  <div class="detail-row">
                    <span class="detail-label">Customer Code:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.customerCode}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Customer Name:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.customerName}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Region:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.region}</span
                    >
                  </div>
                </div>

                <div class="detail-section">
                  <h3 class="section-title">
                    <lightning-icon
                      icon-name="standard:address"
                      size="small"
                    ></lightning-icon>
                    Bill To Address Information
                  </h3>
                  <div class="detail-row">
                    <span class="detail-label">City:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.city}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Address Line 1:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.addressLine1}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Address Line 2:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.addressLine2}</span
                    >
                  </div>
                </div>

                <div class="detail-section">
                  <h3 class="section-title">
                    <lightning-icon
                      icon-name="standard:location"
                      size="small"
                    ></lightning-icon>
                    Ship To Account Information
                  </h3>
                  <div class="detail-row">
                    <span class="detail-label">Ship To Customer Number:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.shipToCustomerNumber}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Ship To Customer Name:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.shipToCustomerName}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Ship To City:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.shipToCity}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Ship To Address Line 1:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.shipToAddressLine1}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Ship To Address Line 2:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.shipToAddressLine2}</span
                    >
                  </div>
                </div>

                <div class="detail-section">
                  <h3 class="section-title">
                    <lightning-icon
                      icon-name="standard:sales_path"
                      size="small"
                    ></lightning-icon>
                    Performance Metrics
                  </h3>
                  <div class="detail-row">
                    <span class="detail-label">Total Investment:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.formattedInvestment}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Total Sales:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.formattedSales}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Cost Recovery:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.formattedCostRecovery}</span
                    >
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Machine Count:</span>
                    <span class="detail-value"
                      >{selectedCustomerData.machines}</span
                    >
                  </div>
                </div>

                <!-- Risk Management Section -->
                <div class="detail-section">
                  <h3 class="section-title">
                    <lightning-icon
                      icon-name="utility:shield"
                      size="small"
                    ></lightning-icon>
                    Risk Management Assessment
                  </h3>
                  <div class="detail-row">
                    <span class="detail-label">Risk Level:</span>
                    <span class="detail-value">
                      <span class={selectedCustomerData.riskBadgeClass}>
                        <lightning-icon
                          icon-name={selectedCustomerData.riskIcon}
                          size="xx-small"
                          class="slds-m-right_xx-small"
                        ></lightning-icon>
                        {selectedCustomerData.riskLevel}
                      </span>
                    </span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">Risk Status:</span>
                    <span class={selectedCustomerData.riskStatusTextClass}
                      >{selectedCustomerData.riskStatusText}</span
                    >
                  </div>
                  <template if:true={selectedCustomerData.showActionRequired}>
                    <div class="detail-row">
                      <span class="detail-label">Required Action:</span>
                      <span class="detail-value"
                        >{selectedCustomerData.riskActionLabel}</span
                      >
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
          <footer class="slds-modal__footer">
            <lightning-button
              variant="neutral"
              label="Close"
              onclick={closeCustomerModal}
            >
            </lightning-button>
          </footer>
        </div>
      </section>
      <div class="slds-backdrop slds-backdrop_open"></div>
    </template></div
></template>
