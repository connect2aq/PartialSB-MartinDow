<template>
    <lightning-modal-header label="Quote PDF Viewer"></lightning-modal-header>
    <lightning-modal-body>
        <div style="width:100%; height:650px;">
            <iframe src={pdfUrl} width="100%" height="100%" frameborder="0"></iframe>
        </div>
    </lightning-modal-body>
    <lightning-modal-footer>
        <lightning-button 
            label="Attach to Files"
            variant="brand"
            onclick={attachPdf}
            disabled={isProcessing}>
        </lightning-button>
        <!-- <lightning-button 
            label="Send Email"
            variant="neutral"
            onclick={sendEmail}
            disabled={isProcessing}>
        </lightning-button> -->
        <lightning-button 
            label="Cancel"
            variant="neutral"
            onclick={closeModal}>
        </lightning-button>
    </lightning-modal-footer>
</template>
