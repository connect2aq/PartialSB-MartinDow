<template>
    <lightning-quick-action-panel header="Approve Visit Planning">
        <div class="slds-p-around_medium">
            <lightning-textarea
                label="Comments"
                value={comment}
                onchange={handleCommentChange}>
            </lightning-textarea>
        </div>
        <div slot="footer">
            <lightning-button
                variant="neutral"
                label="Cancel"
                onclick={handleCancel}>
            </lightning-button>
            <lightning-button
                variant="brand"
                label="Approve"
                onclick={handleApprove}>
            </lightning-button>
        </div>
    </lightning-quick-action-panel>
</template>
